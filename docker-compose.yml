version: '3.8'
services:
  dropwizard-employee:
    build: .
    ports:
      - "8080:8080"
      - "8081:8081"
    volumes:
      - ./data:/app/data
    environment:
      - DW_DEFAULT_NAME=Docker User
      - GRAPHITE_HOST=localhost
      - GRAPHITE_PORT=2003
      - METRICS_PREFIX=docker-example
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
